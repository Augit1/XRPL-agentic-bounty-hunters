services:
  - type: static
    name: poc-workflow-docs
    autoDeploy: true
    staticPublishPath: docs
  - type: web
    name: poc-demo
    runtime: docker
    plan: starter
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_MODE
        value: demo
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3000
      - key: DATABASE_PATH
        value: /app/data/app.db
      - key: ALLOW_DEMO_WALLETS
        value: true
      - key: USE_MOCK_XRPL
        value: false
      - key: XRPL_SERVER
        value: wss://s.altnet.rippletest.net:51233
      - key: XRPL_EXPLORER_BASE_URL
        value: https://testnet.xrpl.org
      - key: X402_ENABLED
        value: false
      - key: X402_FACILITATOR_URL
        value: https://x402.org/facilitator
      - key: X402_NETWORK
        value: eip155:84532
      - key: X402_PRICE_USD
        value: $0.01
      - key: X402_EVM_RPC_URL
        value: https://sepolia.base.org
      - key: X402_EXPLORER_BASE_URL
        value: https://sepolia.basescan.org
      - key: ADMIN_API_KEY
        sync: false
      - key: XRPL_SETTLEMENT_SEED
        sync: false
      - key: XRPL_TREASURY_SEED
        sync: false
      - key: XRPL_COMPANY_SEED
        sync: false
      - key: X402_PAY_TO
        sync: false
      - key: X402_DEMO_BUYER_PRIVATE_KEY
        sync: false
  - type: web
    name: poc-app
    runtime: docker
    plan: starter
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_MODE
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3000
      - key: DATABASE_PATH
        value: /app/data/app.db
      - key: ALLOW_DEMO_WALLETS
        value: false
      - key: USE_MOCK_XRPL
        value: false
      - key: XRPL_SERVER
        value: wss://s.altnet.rippletest.net:51233
      - key: XRPL_EXPLORER_BASE_URL
        value: https://testnet.xrpl.org
      - key: X402_ENABLED
        value: false
      - key: X402_FACILITATOR_URL
        value: https://x402.org/facilitator
      - key: X402_NETWORK
        value: eip155:84532
      - key: X402_PRICE_USD
        value: $0.01
      - key: X402_EVM_RPC_URL
        value: https://sepolia.base.org
      - key: X402_EXPLORER_BASE_URL
        value: https://sepolia.basescan.org
      - key: ADMIN_API_KEY
        sync: false
      - key: XRPL_SETTLEMENT_SEED
        sync: false
      - key: XRPL_TREASURY_SEED
        sync: false
      - key: XRPL_COMPANY_SEED
        sync: false
      - key: X402_PAY_TO
        sync: false
      - key: X402_DEMO_BUYER_PRIVATE_KEY
        sync: false
